<VirtualHost *:80>
    ServerName www.grup3gestions.org
    ServerAlias aplicacio.grup3gestions.org
    ServerAdmin contacte@grup3gestions.org
    DocumentRoot /var/www/appgestions
    ErrorDocument 404 "Error en l'aplicacio web appgestions - fitxer no trobat"
    <Directory /var/www/appgestions>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
</VirtualHost>
