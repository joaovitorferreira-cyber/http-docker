<VirtualHost *:443>
    ServerName intranet.granalmacen.com
    DocumentRoot /var/www/intranet_granalmacen
    SSLEngine on
    SSLCertificateFile /etc/ssl/certs_empresa/intranet.crt
    SSLCertificateKeyFile /etc/ssl/certs_empresa/intranet.key
    <Directory /var/www/intranet_granalmacen>
        Options Indexes FollowSymLinks
        Require all granted
    </Directory>
</VirtualHost>

<VirtualHost *:80>
    ServerName intranet.granalmacen.com
    Redirect permanent / https://intranet.granalmacen.com/
</VirtualHost>
