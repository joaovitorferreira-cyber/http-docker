version: '3.8'
services:
  web-intranet:
    build:
      context: ..
      dockerfile: http.Dockerfile
    container_name: apache-intranet
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config:/etc/apache2/sites-enabled
      - ./html:/var/www
      - ./certs:/etc/ssl/certs_empresa
